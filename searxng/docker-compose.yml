# Docker Compose for SearxNG
# Usage: cd searxng && docker-compose up -d
# Then configure ask-search: ask-search --searxng-url http://localhost:8080

version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # Generate a secure secret key: python3 -c "import secrets; print(secrets.token_hex(32))"
      - SEARXNG_SECRET=${SEARXNG_SECRET:-your-secret-key-change-in-production}
      - SEARXNG_BASE_URL=http://localhost:8080
      # Enable JSON output for API access
      - SEARXNG_SETTINGS_SOURCE=docker
    volumes:
      - ./searxng.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

# Usage:
# 1. Generate a secret key: python3 -c "import secrets; print(secrets.token_hex(32))"
# 2. Copy .env.example to .env and set SEARXNG_SECRET
# 3. Run: docker-compose up -d
# 4. Access SearxNG UI at http://localhost:8080
# 5. Configure ask-search: ask-search --searxng-url http://localhost:8080 --searxng-secret your-secret
